<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AEI UPDD / SDD Portal</title>

<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<header class="topbar">
  <button id="btnBack" onclick="showDashboard()">← Dashboard</button>
  <div class="title">Asahi Europe & International <span>#digital</span></div>
</header>

<div id="dashboard" class="container">
  <h2>Project Portfolio</h2>

  <div class="actions">
    <input id="searchBox" placeholder="Search projects..." oninput="renderDashboard()">
    <button onclick="openNewProject()">+ New Project</button>
  </div>

  <div id="projectCards"></div>
</div>

<div id="projectView" class="hidden">
  <aside id="sidebar"></aside>
  <main id="content"></main>
</div>

<div id="newProjectModal" class="modal hidden">
  <div class="modal-box">
    <h3>Create Project</h3>
    <input id="np_name" placeholder="Project name">
    <button onclick="createProject()">Create</button>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/sections.js"></script>
<script src="js/app.js"></script>

</body>
</html>
